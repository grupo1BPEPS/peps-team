ServerName localhost

LoadModule deflate_module /usr/local/apache2/modules/mod_deflate.so
LoadModule proxy_module /usr/local/apache2/modules/mod_proxy.so
LoadModule proxy_fcgi_module /usr/local/apache2/modules/mod_proxy_fcgi.so
LoadModule proxy_http_module modules/mod_proxy_http.so
#LoadModule headers /usr/local/apache2/modules/mod_headers.so
<VirtualHost *:80>
    ProxyPass /api/ http://pythonb1:5000/api/
    ProxyPassReverse /api/ http://pythonb1:5000/api/
    #RequestHeader set Server "Apache"
    #RequestHeader unset X-Powered-By

    DocumentRoot /var/www/html/
    <Directory /var/www/html/>
        DirectoryIndex index.html
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Send apache logs to stdout and stderr
    CustomLog /proc/self/fd/1 common
    ErrorLog /proc/self/fd/2

    LogFormat "%v %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" \"%{X-Forwarded-For}i\" %D" extended

    CustomLog /proc/self/fd/1 extended
    ErrorLog /proc/self/fd/2
    LogLevel trace8
</VirtualHost>